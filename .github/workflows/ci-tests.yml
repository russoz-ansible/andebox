name: Test andebox

permissions:
  contents: write

on:
  pull_request:
    branches: [main]
  workflow_call:

jobs:
  test:
    name: CI (Ⓐ${{ matrix.ansible }}+py${{ matrix.python }})
    strategy:
      fail-fast: false
      matrix:
        ansible:
          - stable-2.18
          - stable-2.19
          - stable-2.20
          - stable-2.21
          - devel
        python:
          - "3.11"
          - "3.12"
          - "3.13"
          - "3.14"
          - "3.15"
        exclude:
          - ansible: stable-2.18
            python: "3.14"
          - ansible: stable-2.18
            python: "3.15"
          - ansible: stable-2.19
            python: "3.14"
          - ansible: stable-2.19
            python: "3.15"
          - ansible: stable-2.20
            python: "3.11"
          - ansible: stable-2.20
            python: "3.15"
          - ansible: stable-2.21
            python: "3.11"
          - ansible: stable-2.21
            python: "3.15"
          - ansible: devel
            python: "3.11"
          - ansible: devel
            python: "3.12"

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - name: Install poetry and poe
        run: >
          python -m pip install --upgrade pip
          && pip install poetry poethepoet

      - name: Install all dependencies (including dev)
        run: poetry install --with dev

      - name: Install ansible-core (${{ matrix.ansible }})
        run: poetry run pip install --force-reinstall https://github.com/ansible/ansible/archive/${{ matrix.ansible }}.tar.gz --disable-pip-version-check

      - name: Lint
        run: poe lint

      - name: Run tests
        run: poe test
